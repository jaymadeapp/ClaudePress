# .ddev/config.yaml — ClaudePress WooCommerce (e-shop) branch
# Rendered by wp-setup; {{SLUG}} is substituted from resolved-config.json.
# MySQL 8.0 for HPOS engine parity; higher memory for WooCommerce.
name: "{{SLUG}}"
type: wordpress
docroot: web
php_version: "8.3"
database:
  type: mysql
  version: "8.0"
webserver_type: nginx-fpm
web_environment:
  - WP_MEMORY_LIMIT=512M
